	<!-- Function for SET QR Number 1 -->
<script type="text/javascript">
var qrcode = new QRCode(document.getElementById("qrcode"), {
	width : 800,
	height : 800
});

function makeCode () {		
	var elText = document.getElementById("text");
	
	if (!elText.value) {
		alert("Input a text");
		elText.focus();
		return;
	}
	
	qrcode.makeCode(elText.value);
	// Console.log(elText.value);
}
function download (a) {
	var dnl = document.getElementsByClassName("QRElement")[a].scr;
}
