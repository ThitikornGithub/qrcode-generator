<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>QR Code Studio</title>
<script src="qrcode.js"></script>
<style>
  :root {
    --bg: #fafbfc;
    --bg-gradient: #ffffff;
    --text: #0f172a;
    --muted: #64748b;
    --accent: #2f54eb;
    --card-bg: #ffffff;
    --card-border: rgba(15, 23, 42, 0.08);
  }
  * { box-sizing: border-box; }
  html, body {
    margin: 0; padding: 0; min-height: 100%;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Helvetica Neue",
                 "Noto Sans Thai", sans-serif;
    background: var(--bg);
    color: var(--text);
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
  }
  body {
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    background:
      radial-gradient(ellipse 80% 60% at 50% 0%, var(--bg-gradient) 0%, var(--bg) 70%),
      var(--bg);
    overflow: hidden;
    position: relative;
  }

  /* Ambient floating dots */
  .ambient {
    position: absolute;
    inset: 0;
    overflow: hidden;
    pointer-events: none;
    z-index: 0;
  }
  .ambient span {
    position: absolute;
    width: 4px; height: 4px;
    border-radius: 50%;
    background: var(--text);
    opacity: 0;
    animation: float 12s ease-in-out infinite;
  }
  .ambient span:nth-child(1)  { top: 15%; left: 12%; animation-delay: 0s;   }
  .ambient span:nth-child(2)  { top: 78%; left: 8%;  animation-delay: 2s;   }
  .ambient span:nth-child(3)  { top: 22%; left: 88%; animation-delay: 4s;   }
  .ambient span:nth-child(4)  { top: 65%; left: 92%; animation-delay: 1s;   }
  .ambient span:nth-child(5)  { top: 40%; left: 5%;  animation-delay: 6s;   }
  .ambient span:nth-child(6)  { top: 85%; left: 50%; animation-delay: 3s;   }
  .ambient span:nth-child(7)  { top: 10%; left: 55%; animation-delay: 5s;   }
  .ambient span:nth-child(8)  { top: 55%; left: 80%; animation-delay: 7s;   }
  @keyframes float {
    0%, 100% { transform: translateY(0) translateX(0); opacity: 0; }
    20%, 80% { opacity: 0.08; }
    50%      { transform: translateY(-20px) translateX(10px); opacity: 0.12; }
  }

  .container {
    text-align: center;
    padding: 32px;
    max-width: 620px;
    position: relative;
    z-index: 1;
  }

  /* Top animated hero QR (smaller than before to leave room for cards) */
  .qr-visual {
    width: 140px;
    height: 140px;
    margin: 0 auto 32px;
    display: grid;
    gap: 2px;
    animation: breathe 6s ease-in-out infinite;
    animation-delay: 2.5s;
  }
  .qr-visual .cell {
    background: transparent;
    border-radius: 2px;
    opacity: 0;
    transform: scale(0.3);
    animation: reveal 0.7s cubic-bezier(0.34, 1.56, 0.64, 1) both;
  }
  .qr-visual .cell.dark {
    background: var(--text);
  }
  @keyframes reveal {
    from { opacity: 0; transform: scale(0.3); }
    to   { opacity: 1; transform: scale(1); }
  }
  @keyframes breathe {
    0%, 100% { transform: scale(1); }
    50%      { transform: scale(1.025); }
  }

  h1 {
    font-size: 42px;
    font-weight: 700;
    letter-spacing: -0.03em;
    line-height: 1.1;
    margin: 0 0 12px;
    opacity: 0;
    animation: fadeUp 0.9s cubic-bezier(0.22, 1, 0.36, 1) forwards;
    animation-delay: 1.3s;
  }
  p.subtitle {
    font-size: 16px;
    color: var(--muted);
    margin: 0 0 40px;
    line-height: 1.55;
    opacity: 0;
    animation: fadeUp 0.9s cubic-bezier(0.22, 1, 0.36, 1) forwards;
    animation-delay: 1.5s;
  }

  /* Tools grid */
  .tools-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 14px;
    max-width: 540px;
    margin: 0 auto;
  }

  .tool-card {
    background: var(--card-bg);
    border: 1px solid var(--card-border);
    border-radius: 16px;
    padding: 22px 20px;
    text-align: left;
    text-decoration: none;
    color: inherit;
    position: relative;
    overflow: hidden;
    transition: transform 0.35s cubic-bezier(0.22, 1, 0.36, 1),
                box-shadow 0.35s cubic-bezier(0.22, 1, 0.36, 1),
                border-color 0.2s ease;
    box-shadow: 0 1px 2px rgba(15, 23, 42, 0.03);
    opacity: 0;
    animation: fadeUp 0.9s cubic-bezier(0.22, 1, 0.36, 1) forwards;
    display: flex;
    flex-direction: column;
    gap: 12px;
    min-height: 180px;
  }
  .tool-card:nth-child(1) { animation-delay: 1.7s; }
  .tool-card:nth-child(2) { animation-delay: 1.85s; }

  .tool-card:hover {
    transform: translateY(-3px);
    box-shadow: 0 12px 28px rgba(15, 23, 42, 0.08);
    border-color: rgba(47, 84, 235, 0.25);
  }

  .tool-icon {
    width: 44px; height: 44px;
    display: grid;
    gap: 1px;
    flex-shrink: 0;
  }
  .tool-icon .cell {
    background: transparent;
    border-radius: 1px;
    transition: background 0.3s ease;
  }
  .tool-icon .cell.dark {
    background: var(--text);
  }
  .tool-card:hover .tool-icon .cell.dark {
    background: var(--accent);
  }

  .tool-title {
    font-size: 17px;
    font-weight: 600;
    letter-spacing: -0.01em;
    margin: 0 0 4px;
  }
  .tool-desc {
    font-size: 13px;
    color: var(--muted);
    line-height: 1.5;
    margin: 0;
    flex: 1;
  }
  .tool-arrow {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    font-size: 13px;
    font-weight: 500;
    color: var(--muted);
    transition: color 0.2s ease, gap 0.3s cubic-bezier(0.22, 1, 0.36, 1);
    margin-top: 2px;
  }
  .tool-card:hover .tool-arrow {
    color: var(--accent);
    gap: 10px;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(14px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .footer {
    position: absolute;
    bottom: 24px;
    left: 0; right: 0;
    text-align: center;
    font-size: 11px;
    letter-spacing: 0.08em;
    color: var(--muted);
    opacity: 0;
    animation: fadeIn 1.2s ease forwards;
    animation-delay: 2.2s;
  }
  @keyframes fadeIn {
    to { opacity: 0.6; }
  }

  @media (max-width: 600px) {
    h1 { font-size: 30px; }
    p.subtitle { font-size: 14px; margin-bottom: 32px; }
    .qr-visual { width: 110px; height: 110px; margin-bottom: 24px; }
    .container { padding: 20px; }
    .tools-grid { grid-template-columns: 1fr; max-width: 340px; gap: 12px; }
    .tool-card { min-height: auto; }
  }

  @media (prefers-reduced-motion: reduce) {
    *, *::before, *::after {
      animation-duration: 0.01ms !important;
      animation-iteration-count: 1 !important;
      transition-duration: 0.01ms !important;
    }
  }
</style>
</head>
<body>

<div class="ambient" aria-hidden="true">
  <span></span><span></span><span></span><span></span>
  <span></span><span></span><span></span><span></span>
</div>

<div class="container">
  <div class="qr-visual" id="qrVisual" aria-hidden="true"></div>
  <h1>QR Code Studio</h1>
  <p class="subtitle">เครื่องมือสร้าง QR Code สะอาด &mdash; รวดเร็ว, พร้อมใช้งาน</p>

  <div class="tools-grid">
    <a href="qr-generator.html" class="tool-card">
      <div class="tool-icon" data-seed="Batch" aria-hidden="true"></div>
      <div>
        <div class="tool-title">Batch Generator</div>
        <p class="tool-desc">สร้าง QR หลายอันพร้อมกันจาก URL หรือ CSV &mdash; Download PNG / SVG / ZIP</p>
      </div>
      
    </a>

    <a href="vcard.html" class="tool-card">
      <div class="tool-icon" data-seed="vCard" aria-hidden="true"></div>
      <div>
        <div class="tool-title">Business Card (vCard)</div>
        <p class="tool-desc">QR นามบัตร &mdash; สแกนแล้ว Save Contact ลง iPhone / Android ได้ทันที</p>
      </div>
      
    </a>
  </div>
</div>

<div class="footer">MINIMAL &middot; BATCH &middot; VCARD &middot; PNG / SVG</div>

<script>
(function () {
  'use strict';

  function buildDecorativeQR(container, seed, opts) {
    opts = opts || {};
    var holder = document.createElement('div');
    holder.style.position = 'absolute';
    holder.style.left = '-9999px';
    document.body.appendChild(holder);

    try {
      var qr = new QRCode(holder, {
        text: seed,
        width: 64, height: 64,
        correctLevel: QRCode.CorrectLevel.H
      });
      var model = qr._oQRCode;
      if (!model || !model.moduleCount) throw new Error('no model');

      var n = model.moduleCount;
      container.style.gridTemplateColumns = 'repeat(' + n + ', 1fr)';
      container.style.gridTemplateRows = 'repeat(' + n + ', 1fr)';

      var animate = !!opts.animate;
      var cx = (n - 1) / 2, cy = (n - 1) / 2;
      var maxDist = Math.sqrt(cx * cx + cy * cy);
      var baseDelay = opts.baseDelay || 0;

      var frag = document.createDocumentFragment();
      for (var r = 0; r < n; r++) {
        for (var c = 0; c < n; c++) {
          var cell = document.createElement('div');
          cell.className = 'cell' + (model.isDark(r, c) ? ' dark' : '');
          if (animate) {
            var dist = Math.sqrt((r - cy) * (r - cy) + (c - cx) * (c - cx));
            var delay = baseDelay + (dist / maxDist) * 900 + Math.random() * 120;
            cell.style.animationDelay = delay.toFixed(0) + 'ms';
          }
          frag.appendChild(cell);
        }
      }
      container.appendChild(frag);
    } catch (e) {
      container.style.display = 'none';
    } finally {
      if (holder.parentNode) holder.parentNode.removeChild(holder);
    }
  }

  // Big animated hero QR
  buildDecorativeQR(document.getElementById('qrVisual'), 'Welcome', { animate: true });

  // Small static QR icons in each tool card (unique per card via seed)
  var icons = document.querySelectorAll('.tool-icon');
  for (var i = 0; i < icons.length; i++) {
    buildDecorativeQR(icons[i], icons[i].dataset.seed || 'QR', { animate: false });
  }
})();
</script>
</body>
</html>
